services:
  mysql:
    image: mysql:8.0
    command: >
      --default-authentication-plugin=mysql_native_password
      --bind-address=0.0.0.0

    container_name: mysql_asistencias    
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: cedilloSQL
      MYSQL_DATABASE: ControlAsistencia
      MYSQL_USER: ivancd
      MYSQL_PASSWORD: cedilloSQL

    ports:
      - "3308:3306"

    volumes:
      - mysql_asistencias_data:/var/lib/mysql    

networks:
  mysql_asistencias_network:              
    driver: bridge

volumes:
  mysql_asistencias_data:                
    driver: local